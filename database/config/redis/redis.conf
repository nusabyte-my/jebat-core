```# ==================== JEBAT AI System - Redis Configuration ====================
# Version: 1.0.0
# Optimized for high-performance caching and queue operations

# ==================== Network Configuration ====================
# Bind to specific interface (0.0.0.0 for all interfaces)
bind 0.0.0.0

# Protected mode - yes prevents external access without password
protected-mode yes

# Port
port 6379

# TCP backlog (higher values for better performance with many connections)
tcp-backlog 511

# Timeout for idle connections (0 = never timeout)
timeout 0

# TCP keepalive (seconds)
tcp-keepalive 60

# ==================== General Configuration ====================
# Daemonize (no - running in Docker container)
daemonize no

# Supervised mode (auto-detect init system)
supervised no

# PID file (not used in Docker but kept for reference)
# pidfile /var/run/redis_6379.pid

# Log level (debug, verbose, notice, warning)
loglevel notice

# Log file (stdout in Docker)
logfile ""

# Number of databases
databases 16

# ==================== Snapshotting (RDB) ====================
# Save the DB to disk if at least 1 key changed in 900 seconds
save 900 1
# Save if at least 10 keys changed in 300 seconds
save 300 10
# Save if at least 10000 keys changed in 60 seconds
save 60 10000

# Stop writing if there's an error (yes = safer, no = risk data loss)
stop-writes-on-bgsave-error yes

# Use RDB compression (yes = save space, no = faster saves)
rdbcompression yes

# RDB checksum (yes = data integrity, no = faster but less safe)
rdbchecksum yes

# RDB filename
dbfilename dump.rdb

# Working directory (must be writable)
dir /data

# ==================== Replication ====================
# Master password (not used in single-node setup)
# masterauth <master-password>

# Replica read preference (yes = replicas are read-only)
replica-read-only yes

# Replica priority (for failover)
replica-priority 100

# ==================== Security ====================
# Require clients to issue AUTH command
requirepass redis_secure_password_change_me

# Rename dangerous commands (uncomment for production)
# rename-command CONFIG ""
# rename-command FLUSHALL ""
# rename-command FLUSHDB ""
# rename-command DEBUG ""
# rename-command SHUTDOWN ""

# ==================== Limits ====================
# Maximum number of clients
maxclients 10000

# Maximum memory usage (256MB as per Docker config)
maxmemory 256mb

# Memory eviction policy (allkeys-lru = evict least recently used keys)
maxmemory-policy allkeys-lru

# ==================== Append Only Mode (AOF) ====================
# Enable AOF persistence
appendonly yes

# AOF filename
appendfilename "appendonly.aof"

# fsync policy: everysec = balance between safety and performance
appendfsync everysec

# No-appendfsync-on-rewrite = yes = don't fsync during rewrite
no-appendfsync-on-rewrite no

# Auto-rewrite AOF file when it grows 100% from original size
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# AOF load truncate at load (yes = try to load truncated AOF files)
aof-load-truncated yes

# AOF use RDB preamble (yes = use mixed RDB+AOF format)
aof-use-rdb-preamble yes

# ==================== Redis Cluster ====================
# Cluster mode (disabled for single-node setup)
cluster-enabled no

# Cluster config filename
# cluster-config-file nodes-6379.conf

# Cluster node timeout
# cluster-node-timeout 15000

# ==================== Slow Log ====================
# Slow log length (number of entries)
slowlog-log-slower-than 10000

# Slow log max length (number of entries)
slowlog-max-len 128

# ==================== Latency Monitor ====================
# Latency monitor threshold (milliseconds)
latency-monitor-threshold 100

# ==================== Event Notification ====================
# Notify keyspace events (empty string = disable all)
# Example: Ex = notify on expired events
notify-keyspace-events ""

# ==================== Advanced Config ====================
# Hash max ziplist entries (optimize memory for small hashes)
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# List max ziplist size (optimize memory for small lists)
list-max-ziplist-size -2

# List compress depth (compress nodes at ends)
list-compress-depth 0

# Set max intset entries (optimize memory for small sets)
set-max-intset-entries 512

# Zset max ziplist entries (optimize memory for small sorted sets)
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# Hyperloglog size
hll-sparse-max-bytes 3000

# Stream node max bytes
stream-node-max-bytes 4096
stream-node-max-entries 100

# Active rehashing (yes = background rehashing)
activerehashing yes

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Hz (frequency of background tasks)
hz 10

# Dynamic hz (adjust hz based on activity)
dynamic-hz yes

# AOF rewrite incremental fsync
aof-rewrite-incremental-fsync yes

# RDB save incremental fsync
rdb-save-incremental-fsync yes

# ==================== JEBAT-specific Optimizations ====================
# Hot cache key prefix pattern
# All keys starting with "hot:" are in HOT cache tier
# Example: hot:user:123:session:456

# Warm cache key prefix pattern
# All keys starting with "warm:" are in WARM cache tier
# Example: warm:agent:10:config

# Cold cache key prefix pattern
# All keys starting with "cold:" are in COLD cache tier
# Example: cold:embedding:user:123:profile

# Queue key patterns
# Task queues: queue:tasks:pending
# Dead letter queue: queue:tasks:dlq
# Agent queues: queue:agent:10:tasks

# Session key patterns
# Session data: session:456
# Session metadata: session:456:meta

# Metrics key patterns
# Real-time metrics: metrics:agent:10:performance
# Aggregated metrics: metrics:system:hourly

# ==================== Performance Tuning ====================
# Disable huge pages (better for Redis)
disable-thp yes

# Enable lazy-free (free memory in background)
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# Enable thread I/O (Redis 7+)
io-threads 4
io-threads-do-reads yes

# ==================== Logging ====================
# Syslog facility (not used in Docker but kept for reference)
# syslog-enabled no
# syslog-ident redis
# syslog-facility local0

# Crash log (not used in Docker but kept for reference)
# crash-log-enabled no
# crash-memcheck-enabled no

# ==================== Debugging ====================
# Verbose replication (no for production)
# repl-diskless-sync no
# repl-diskless-sync-delay 5

# ==================== Sentinel Integration ====================
# Sentinel monitor (not used in single-node setup)
# sentinel monitor <master-name> <ip> <port> <quorum>
# sentinel auth-pass <master-name> <password>
# sentinel down-after-milliseconds <master-name> 30000
# sentinel parallel-syncs <master-name> 1
# sentinel failover-timeout <master-name> 180000

# ==================== Additional JEBAT-specific Settings ====================
# Connection pool timeout (seconds)
# Set via application code, not Redis config

# Pipeline batch size
# Set via application code, not Redis config

# Circuit breaker settings
# Set via application code, not Redis config

# ==================== Notes ====================
# This configuration is optimized for:
# - HOT cache: Fast access, low TTL (5 minutes)
# - WARM cache: Medium access, medium TTL (1 hour)
# - COLD cache: Slow access, high TTL (24 hours)
# - Task queues: Priority-based, persistent
# - Session management: Fast access, TTL-based expiration
# - Metrics: Time-series, aggregated, auto-expire

# Memory usage breakdown (256MB total):
# - HOT cache: ~100MB
# - WARM cache: ~80MB
# - COLD cache: ~50MB
# - Task queues: ~15MB
# - Session data: ~10MB
# - System overhead: ~1MB

# Expected performance:
# - Hot cache: < 1ms latency
# - Warm cache: < 2ms latency
# - Cold cache: < 5ms latency
# - Queue operations: < 1ms latency
# - 10,000+ ops/sec sustained throughput
