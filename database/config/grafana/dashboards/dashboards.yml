# ==================== JEBAT AI System - Grafana Dashboards Configuration ====================
# Version: 1.0.0
# This file configures dashboards for monitoring the JEBAT system

apiVersion: 1

providers:
  # ==================== JEBAT System Dashboards ====================
  - name: 'JEBAT System'
    orgId: 1
    folder: 'JEBAT'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true

  # ==================== JEBAT Memory System Dashboards ====================
  - name: 'JEBAT Memory System'
