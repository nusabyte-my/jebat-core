set -g mouse on
set -g history-limit 200000
set -g set-clipboard on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g escape-time 10
set -g focus-events on
set -g status-interval 5
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',xterm-256color:RGB'

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
setw -g mode-keys vi

set -g status-style fg=#d8dee9,bg=#1b2430
set -g message-style fg=#0b0f14,bg=#ebcb8b
set -g pane-border-style fg=#3b4252
set -g pane-active-border-style fg=#88c0d0
set -g status-left-length 40
set -g status-right-length 120
set -g status-left '#[fg=#88c0d0,bold]#S #[fg=#81a1c1]| #[fg=#d8dee9]#(whoami)@#H'
set -g status-right '#[fg=#a3be8c]%Y-%m-%d #[fg=#ebcb8b]%H:%M #[fg=#81a1c1]| #[fg=#d8dee9]#(pwd | xargs basename)'
