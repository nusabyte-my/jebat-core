[general]
live_config_reload = true

[window]
opacity = 0.96
padding = { x = 10, y = 10 }
decorations = "Full"
startup_mode = "Windowed"
dynamic_title = true

[scrolling]
history = 500
multiplier = 5

[font]
size = 12.0
builtin_box_drawing = true

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<\t"

[cursor]
style = { shape = "Block", blinking = "Off" }
unfocused_hollow = true

[mouse]
hide_when_typing = true

[terminal]
osc52 = "CopyPaste"

[terminal.shell]
program = "/usr/bin/fish"
args = ["-l", "-C", "set -gx OPERATOR_PROFILE redteam; set -gx ALACRITTY_TITLE REDTEAM-OPS; if command -q tmux; tmux new-session -A -s redteam; else; exec fish -l; end"]

[env]
TERM = "xterm-256color"
COLORTERM = "truecolor"
OPERATOR_PROFILE = "redteam"
ALACRITTY_TITLE = "REDTEAM-OPS"

[colors.primary]
background = "#0a0a0a"
foreground = "#d7d7d7"
dim_foreground = "#8a8a8a"
bright_foreground = "#ffffff"

[colors.cursor]
text = "#0a0a0a"
cursor = "#ff5555"

[colors.vi_mode_cursor]
text = "#0a0a0a"
cursor = "#ffb86c"

[colors.search.matches]
foreground = "#0a0a0a"
background = "#f1fa8c"

[colors.search.focused_match]
foreground = "#0a0a0a"
background = "#50fa7b"

[colors.footer_bar]
foreground = "#d7d7d7"
background = "#1a1010"

[colors.hints.start]
foreground = "#0a0a0a"
background = "#f1fa8c"

[colors.hints.end]
foreground = "#d7d7d7"
background = "#1a1010"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.selection]
text = "CellForeground"
background = "#3a1f1f"

[colors.normal]
black = "#1b1b1b"
red = "#ff5555"
green = "#50fa7b"
yellow = "#f1fa8c"
blue = "#bd93f9"
magenta = "#ff79c6"
cyan = "#8be9fd"
white = "#d7d7d7"

[colors.bright]
black = "#5a5a5a"
red = "#ff6e6e"
green = "#69ff94"
yellow = "#ffffa5"
blue = "#d6acff"
magenta = "#ff92df"
cyan = "#a4ffff"
white = "#ffffff"

[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key = "F"
mods = "Control|Shift"
action = "SearchForward"

[[keyboard.bindings]]
key = "B"
mods = "Control|Shift"
action = "SearchBackward"

[[keyboard.bindings]]
key = "Space"
mods = "Control|Shift"
action = "ToggleViMode"

[[keyboard.bindings]]
key = "N"
mods = "Control|Shift"
action = "CreateNewWindow"

[[keyboard.bindings]]
key = "L"
mods = "Control|Shift"
chars = "clear\u000d"

[[keyboard.bindings]]
key = "PageUp"
mods = "Shift"
action = "ScrollPageUp"

[[keyboard.bindings]]
key = "PageDown"
mods = "Shift"
action = "ScrollPageDown"

[[keyboard.bindings]]
key = "Equals"
mods = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
action = "ResetFontSize"
