# docker-compose.yml — quick JEBAT deployment
#   docker compose up -d        # start in background
#   docker compose run jebat    # interactive session

version: "3.9"

services:
  jebat:
    build: .
    image: jebat:latest
    container_name: jebat
    stdin_open: true    # docker run -i
    tty: true           # docker run -t
    volumes:
      # Mount config so API keys persist between container restarts
      - ~/.jebat:/root/.jebat
      # Optional: mount your project directory
      - ${PWD:-.}:/workspace
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SHODAN_API_KEY=${SHODAN_API_KEY:-}
    entrypoint: ["jebat"]
    command: ["--help"]