server {
    listen 80;
    server_name jebat.online www.jebat.online;
    include /etc/nginx/snippets/security-headers.conf;
    include /etc/nginx/snippets/hsts.conf;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name jebat.online www.jebat.online;
    include /etc/nginx/snippets/security-headers.conf;
    include /etc/nginx/snippets/hsts.conf;
    ssl_certificate /etc/letsencrypt/live/jebat.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jebat.online/privkey.pem;

    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    add_header CF-Cache-Status "BYPASS" always;

    location = /docs {
        root /var/www/jebat.online;
        try_files /docs.html =404;
    }

    # Public Swagger route proxies to the API's native Swagger endpoint.
    location = /swagger {
        proxy_pass http://127.0.0.1:8000/swagger;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /var/www/jebat.online;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location = /chat {
        return 301 /chat/;
    }

    location /chat/ {
        alias /var/www/jebat.online/chat/;
        index index.html;
        try_files $uri $uri/ /chat/index.html;
    }

    location /ollama/ {
        proxy_pass http://127.0.0.1:11434/;
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 600s;
        proxy_buffering off;
        chunked_transfer_encoding off;
    }

    location /webui/ws/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /webui/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/system/ { proxy_pass http://127.0.0.1:8787; proxy_set_header Host $host; }
    location ^~ /api/keris/ { proxy_pass http://127.0.0.1:8787; proxy_set_header Host $host; }
    location ^~ /api/nexus/ { proxy_pass http://127.0.0.1:8787; proxy_set_header Host $host; }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /deploy-webhook {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
        client_max_body_size 10m;
        access_log /var/log/nginx/deploy-webhook.access.log;
        error_log /var/log/nginx/deploy-webhook.error.log;
    }
}
