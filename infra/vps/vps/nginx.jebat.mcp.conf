# JEBAT MCP Server — nginx vhost for jebat.nusabyte.my
# Proxies Streamable HTTP + SSE to the Docker container on :8100

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name jebat.nusabyte.my;
    return 301 https://$host$request_uri;
}

# HTTPS — MCP Streamable HTTP endpoint
server {
    listen 443 ssl http2;
    server_name jebat.nusabyte.my;

    # SSL certs — reuse existing Let's Encrypt or generate new
    ssl_certificate /etc/letsencrypt/live/jebat.nusabyte.my/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jebat.nusabyte.my/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # ── MCP Streamable HTTP endpoint ──────────────────────────
    # POST /mcp — client sends JSON-RPC requests
    # GET  /mcp — SSE connection for server notifications
    # DELETE /mcp — terminate session

    location /mcp {
        proxy_pass http://127.0.0.1:8100/mcp;
        proxy_http_version 1.1;

        # SSE support — keep connections alive
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;

        # Chunked transfer encoding for streaming
        proxy_set_header Transfer-Encoding chunked;

        # Standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Timeout — long-running tools may take minutes
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # CORS — allow IDE connections from any origin
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Methods 'GET, POST, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization' always;

        # Handle OPTIONS preflight
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Health check endpoint ──────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8100/health;
        proxy_set_header Host $host;
    }

    # ── MCP info page (human-readable) ────────────────────────
    location / {
        default_type text/html;
        return 200 '<html><body>
            <h1>JEBAT MCP Server</h1>
            <p>Protocol: MCP 2025-03-26 (Streamable HTTP)</p>
            <p>Endpoint: <code>https://jebat.nusabyte.my/mcp</code></p>
            <p>Tools: web_search, file_read, terminal_exec, nmap_scan, vision, ...</p>
            <p>Sampling: enabled (createMessage via 9Router)</p>
            <h2>IDE Config</h2>
            <pre>
{
  "mcpServers": {
    "jebat": {
      "url": "https://jebat.nusabyte.my/mcp",
      "transport": "streamable-http"
    }
  }
}
            </pre>
        </body></html>';
    }
}