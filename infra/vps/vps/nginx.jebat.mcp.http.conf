# JEBAT MCP Server — nginx vhost for jebat.nusabyte.my
# HTTP-only until DNS is set up and certbot can issue a cert
# Then switch to HTTPS with certbot --nginx

upstream jebat_mcp {
    server 127.0.0.1:8100;
    keepalive 32;
}

server {
    listen 80;
    server_name jebat.nusabyte.my;

    # MCP Streamable HTTP endpoint
    location /mcp {
        proxy_pass http://jebat_mcp;
        proxy_http_version 1.1;

        # SSE support (long-lived connections)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # MCP protocol headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-MCP-Protocol-Version "2025-03-26";
    }

    # Health check endpoint
    location /health {
        proxy_pass http://jebat_mcp/health;
        proxy_http_version 1.1;
    }

    # SSE events endpoint
    location /sse {
        proxy_pass http://jebat_mcp;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # Reject everything else
    location / {
        return 404 'JEBAT MCP Server — use /mcp endpoint';
    }
}