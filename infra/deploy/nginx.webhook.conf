# JEBAT Deploy Webhook — nginx location snippet
# Include in the main jebat.online server block, or place in
# /etc/nginx/sites-enabled/jebat.webhook.conf (must be after the main server block).
#
# GitHub sends POST /deploy-webhook → nginx proxies to local listener.

location /deploy-webhook {
    proxy_pass http://127.0.0.1:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # Must not buffer — GitHub expects quick 200
    proxy_buffering off;
    proxy_cache off;

    # Reasonable timeout for the deploy script
    proxy_read_timeout 120s;
    proxy_send_timeout 30s;

    # Stricter body size — pushes are small
    client_max_body_size 10m;

    # Logging
    access_log /var/log/nginx/deploy-webhook.access.log;
    error_log  /var/log/nginx/deploy-webhook.error.log;
}
