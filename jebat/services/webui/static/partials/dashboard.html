<!-- dashboard partial -->
<style>
  /* dashboard-specific overrides */
  .kpi-value { font-size: var(--size-h1); font-weight: var(--weight-medium); color: var(--black); }
  .kpi-label { font-size: var(--size-caption); color: var(--stone); text-transform: uppercase; letter-spacing: 0.06em; }
  .runtime-row { display: flex; justify-content: space-between; align-items: center; padding: var(--space-sm) 0; border-bottom: 1px solid var(--gray-light); }
  .runtime-row:last-child { border-bottom: none; }
</style>

<div class="container section-sm">
  <h2>Dashboard</h2>
  <p class="small muted" style="margin-bottom: var(--space-lg);">Live system overview. Auto-refreshes every 5s.</p>
</div>

<!-- KPI cards -->
<div class="container" style="margin-bottom: var(--space-lg);">
  <div class="grid grid-4">
    <div class="card" style="text-align: center;">
      <div class="kpi-label">Model</div>
      <div class="kpi-value" id="kpi-model">—</div>
    </div>
    <div class="card" style="text-align: center;">
      <div class="kpi-label">Provider</div>
      <div class="kpi-value" id="kpi-provider">—</div>
    </div>
    <div class="card" style="text-align: center;">
      <div class="kpi-label">Safety</div>
      <div class="kpi-value" id="kpi-safety">—</div>
    </div>
    <div class="card" style="text-align: center;">
      <div class="kpi-label">Uptime</div>
      <div class="kpi-value" id="kpi-uptime">—</div>
    </div>
  </div>
</div>

<!-- Component status -->
<div class="container">
  <div class="grid grid-2">
    <div class="card">
      <div class="card-header"><div class="card-title">Components</div></div>
      <div id="component-list" class="card-body">Loading…</div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Runtime Config</div></div>
      <div id="runtime-dump" class="card-body">Loading…</div>
    </div>
  </div>
</div>

<!-- Console meta -->
<div class="container" style="margin-top: var(--space-lg);">
  <div class="card">
    <div class="card-header"><div class="card-title">Console Health</div></div>
    <div class="card-body" id="console-dump">Loading…</div>
  </div>
</div>

<script>
  async function refreshDashboard() {
    try {
      const [status, runtime] = await Promise.all([
        API.status(), API.runtime()
      ]);

      // Components from /api/status
      const comps = status.components || {};
      document.getElementById('component-list').innerHTML = Object.entries(comps)
        .map(([k, v]) => `<div class="runtime-row"><span>${k}</span><span class="chip chip-ok">${v}</span></div>`)
        .join('');

      // Provider / model from /api/runtime
      const prov = runtime.provider || {};
      document.getElementById('kpi-model').textContent = prov.configured_model || '—';
      document.getElementById('kpi-provider').textContent = prov.effective || '—';
      document.getElementById('kpi-safety').textContent = prov.configured || '—';
      document.getElementById('kpi-uptime').textContent = '—';

      // Dump raw runtime
      document.getElementById('runtime-dump').innerHTML = '<pre>' + JSON.stringify(runtime, null, 2) + '</pre>';
      document.getElementById('console-dump').textContent = 'N/A';
    } catch (err) {
      console.error('Dashboard refresh failed:', err);
    }
  }

  refreshDashboard();
  setInterval(() => {
    if (document.getElementById('kpi-model')) refreshDashboard();
  }, 5000);
</script>
