<!-- Control Center -->
<style>
  .control-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: var(--space-md); }
</style>

<div>
  <h2 style="margin-bottom:var(--space-lg)">⚙️ Control Center</h2>

  <div class="control-grid">
    <!-- Runtime Status -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Runtime</div>
        <span class="badge badge-green" id="ctrl-runtime-status">Active</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:var(--space-sm)">
        <div class="flex justify-between"><span class="text-sm text-muted">Provider</span><span class="text-sm font-mono" id="ctrl-provider">—</span></div>
        <div class="flex justify-between"><span class="text-sm text-muted">Model</span><span class="text-sm font-mono" id="ctrl-model">—</span></div>
        <div class="flex justify-between"><span class="text-sm text-muted">Profile</span><span class="text-sm font-mono" id="ctrl-profile">default</span></div>
      </div>
      <div class="mt-md">
        <button class="btn btn-sm" id="ctrl-refresh">↻ Refresh</button>
      </div>
    </div>

    <!-- Provider Auth -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Provider Auth</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:var(--space-sm)">
        <select class="select" id="ctrl-auth-provider">
          <option value="">Select provider...</option>
        </select>
        <input class="input" id="ctrl-auth-secret" type="password" placeholder="API Key" />
        <button class="btn btn-primary btn-sm" id="ctrl-auth-save">Save Key</button>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Quick Actions</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:var(--space-sm)">
        <button class="btn" onclick="location.hash='#sahabat'">🤖 Open Sahabat</button>
        <button class="btn" onclick="location.hash='#keris'">🛡️ Open Keris</button>
        <button class="btn" onclick="location.hash='#perisai'">🌐 Open Perisai</button>
      </div>
    </div>

    <!-- System Info -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">System</div>
      </div>
      <div class="terminal" style="font-size:var(--font-size-xs)">
        <div><span class="prompt">$</span> jebat --version</div>
        <div class="output">JEBAT v8.2.1</div>
        <div><span class="prompt">$</span> python --version</div>
        <div class="output">Python 3.13.7</div>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById('ctrl-refresh')?.addEventListener('click', async () => {
    try {
      if (typeof API !== 'undefined') {
        const rt = await API.runtime();
        document.getElementById('ctrl-provider').textContent = rt.provider || '—';
        document.getElementById('ctrl-model').textContent = rt.model || '—';
        document.getElementById('ctrl-profile').textContent = rt.profile || 'default';

        const catalog = rt.providers?.catalog || {};
        const sel = document.getElementById('ctrl-auth-provider');
        sel.innerHTML = '<option value="">Select provider...</option>';
        for (const name of Object.keys(catalog)) {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          sel.appendChild(opt);
        }
      }
    } catch {}
  });
  document.getElementById('ctrl-refresh')?.click();
</script>
