<!-- skills partial -->
<div class="container section-sm">
  <h2>Skills</h2>
  <p class="small muted" style="margin-bottom: var(--space-lg);">Registered skill modules from the skill registry. Import from Hermes, OpenClaw, Claude Code, and Codex.</p>
</div>

<div class="container" style="margin-bottom: var(--space-lg);">
  <div class="row">
    <input class="input" id="skill-search" type="search" placeholder="Filter skills…" style="max-width: 320px;" />
    <div class="btn-group">
      <button class="btn btn-outline btn-sm" id="btn-import-hermes">Import from Hermes</button>
      <button class="btn btn-outline btn-sm" id="btn-import-claude">Import from Claude</button>
      <button class="btn btn-outline btn-sm" id="btn-import-codex">Import from Codex</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="list" id="skill-list">Loading…</div>
</div>

<div class="container section" id="skill-detail" style="display: none;">
  <div class="card">
    <div class="card-header">
      <div class="card-title" id="skill-detail-name"></div>
      <button class="btn btn-outline btn-sm" id="skill-detail-close">Close</button>
    </div>
    <div class="card-body">
      <div class="meta-row" id="skill-detail-tags" style="margin-bottom: var(--space-md);"></div>
      <pre id="skill-detail-body"></pre>
    </div>
  </div>
</div>

<script>
  let allSkills = [];

  async function loadSkills(filter = '') {
    try {
      const meta = await API.consoleMeta();
      const skills = meta.skills || {};

      // Normalize to flat array of {name, description, path, category}
      allSkills = (skills.top || []).map(s =>
        typeof s === 'string' ? { name: s, description: '' } : s
      );
      const count = skills.count || allSkills.length;

      const filtered = filter
        ? allSkills.filter(s => {
            const term = filter.toLowerCase();
            return (s.name || '').toLowerCase().includes(term) ||
                   (s.description || '').toLowerCase().includes(term) ||
                   (s.category || '').toLowerCase().includes(term);
          })
        : allSkills;

      const list = document.getElementById('skill-list');
      const statsInfo = `<p class="small muted" style="margin-bottom: var(--space-sm);">${count} skills registered</p>`;

      if (filtered.length === 0) {
        list.innerHTML = statsInfo + '<div class="empty"><h3>No skills found</h3><p>Try a different search or import from other agents.</p></div>';
        return;
      }

      list.innerHTML = statsInfo + filtered.map(s => {
        const name = s.name;
        const desc = s.description || '';
        const cat = s.category ? `<span class="chip">${s.category}</span>` : '';
        return `<div class="list-item">
          <div><strong>${name}</strong>${cat}<br><span class="small muted">${desc}</span></div>
          <button class="btn btn-outline btn-sm" data-skill="${name}">View</button>
        </div>`;
      }).join('');

      list.querySelectorAll('[data-skill]').forEach(btn => {
        btn.addEventListener('click', () => viewSkill(btn.dataset.skill));
      });
    } catch (e) {
      document.getElementById('skill-list').innerHTML = `<div class="empty"><h3>Cannot load skills</h3><p>${e.message}</p></div>`;
    }
  }

  function viewSkill(name) {
    const skill = allSkills.find(s => s.name === name);
    document.getElementById('skill-detail-name').textContent = name;
    document.getElementById('skill-detail-tags').innerHTML =
      skill && skill.category ? `<span class="chip">${skill.category}</span>` : '';
    document.getElementById('skill-detail-body').textContent =
      skill ? (skill.source || `Skill details not available in WebUI. Use CLI: jebat skill view ${name}`) :
      `Skill details not available in this view. Use CLI: jebat skill view ${name}`;
    document.getElementById('skill-detail').style.display = 'block';
  }

  document.getElementById('skill-detail-close').addEventListener('click', () => {
    document.getElementById('skill-detail').style.display = 'none';
  });

  document.getElementById('skill-search').addEventListener('input', e => loadSkills(e.target.value));
  document.getElementById('btn-import-hermes').addEventListener('click', () => importSkills('hermes'));
  document.getElementById('btn-import-claude').addEventListener('click', () => importSkills('claude'));
  document.getElementById('btn-import-codex').addEventListener('click', () => importSkills('codex'));

  async function importSkills(source) {
    try {
      const res = await API.post('/skills/import', { source, action: 'preview' });
      alert(`Import preview: ${res.count || 0} skills from ${source}`);
    } catch (e) {
      alert(`Import failed: ${e.message}`);
    }
  }

  loadSkills();
</script>
