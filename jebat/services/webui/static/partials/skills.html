<!-- Skills -->
<div>
  <h2 style="margin-bottom:var(--space-lg)">🧠 Skills</h2>
  <p class="text-muted mb-lg">Procedural memory — reusable approaches for recurring tasks.</p>

  <div class="flex gap-sm mb-lg">
    <input class="input" id="skills-search" placeholder="Search skills..." style="max-width:400px" />
    <button class="btn btn-sm" id="skills-refresh">↻ Refresh</button>
  </div>

  <div class="grid grid-auto" id="skills-grid">
    <div class="empty-state" style="grid-column:1/-1">
      <div class="empty-state-icon">🧠</div>
      <div class="empty-state-title">Loading skills...</div>
    </div>
  </div>
</div>

<script>
  async function loadSkills() {
    try {
      const res = await fetch('/api/skills');
      const data = await res.json();
      const grid = document.getElementById('skills-grid');
      if (!data.skills || data.skills.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">🧠</div><div class="empty-state-title">No skills found</div></div>';
        return;
      }
      grid.innerHTML = data.skills.map(s => `
        <div class="card" style="cursor:pointer">
          <div class="card-header">
            <div class="card-title text-sm">${s.name}</div>
            <span class="badge badge-muted">${s.category || 'general'}</span>
          </div>
          <p class="text-sm text-muted">${s.description || ''}</p>
        </div>
      `).join('');
    } catch { document.getElementById('skills-grid').innerHTML = '<div class="text-red text-sm">Failed to load skills</div>'; }
  }
  loadSkills();
  document.getElementById('skills-refresh')?.addEventListener('click', loadSkills);
</script>
