<!-- Keris — Sentinel Security -->
<style>
  .keris-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 768px) { .keris-layout { grid-template-columns: 1fr; } }
  .scan-form { display: flex; gap: 8px; margin-bottom: 16px; }
  .scan-form input { flex: 1; }
  .scan-result { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; font-family: var(--font-mono); font-size: 13px; white-space: pre-wrap; max-height: 500px; overflow-y: auto; }
  .scan-history-item { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .severity-badge { display: inline-block; padding: 2px 8px; border-radius: var(--radius-pill); font-size: 11px; font-weight: 600; }
  .sev-critical { background: rgba(239,68,68,0.15); color: #ef4444; }
  .sev-high { background: rgba(249,115,22,0.15); color: #f97316; }
  .sev-medium { background: rgba(234,179,8,0.15); color: #eab308; }
  .sev-low { background: rgba(34,197,94,0.15); color: #22c55e; }
  .sev-info { background: rgba(99,102,241,0.15); color: #6366f1; }
</style>

<div class="page-header">
  <div>
    <h1 class="page-title">🛡️ Keris — Sentinel Security</h1>
    <p class="page-desc">Autonomous pentest orchestrator with AI analysis</p>
  </div>
</div>

<div class="scan-form">
  <input type="text" id="keris-target" placeholder="Target domain or IP (e.g. example.com)" class="input" />
  <select id="keris-profile" class="input" style="flex:0 0 120px">
    <option value="quick">Quick</option>
    <option value="standard" selected>Standard</option>
    <option value="full">Full</option>
    <option value="vuln">Vuln Only</option>
  </select>
  <button class="btn btn-primary" onclick="runScan()">🔍 Scan</button>
</div>

<div class="keris-layout">
  <div>
    <div class="section-title" style="margin-bottom:8px">Scan Result</div>
    <div class="scan-result" id="scan-result">
      Enter a target and click Scan to begin a security assessment.
    </div>
  </div>
  <div>
    <div class="section-title" style="margin-bottom:8px">History</div>
    <div id="scan-history">
      <div style="color: var(--text-muted); font-size: 13px">Loading...</div>
    </div>
  </div>
</div>

<script>
async function runScan() {
  const target = document.getElementById('keris-target').value.trim();
  const profile = document.getElementById('keris-profile').value;
  if (!target) { toast('Enter a target', 'error'); return; }

  const resultEl = document.getElementById('scan-result');
  resultEl.innerHTML = '<span class="skeleton skeleton-text" style="width:80%"></span><br><span class="skeleton skeleton-text" style="width:60%"></span><br><span class="skeleton skeleton-text" style="width:70%"></span><br><br>Scanning ' + target + ' (' + profile + ')...';
  toast('Scan started: ' + target, 'info');
  logActivity('KERIS', 'Scan started: ' + target + ' [' + profile + ']');

  try {
    const r = await fetch('/api/keris/scan', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({target, profile})
    });
    const data = await r.json();
    if (data.error) {
      resultEl.textContent = 'Error: ' + data.error;
      toast('Scan failed: ' + data.error, 'error');
    } else {
      resultEl.textContent = data.briefing || JSON.stringify(data, null, 2);
      toast('Scan complete — ' + data.severity + ' (score: ' + data.score + '/100)', 'success');
      logActivity('KERIS', 'Scan complete: ' + target + ' — ' + data.severity);
      loadHistory();
    }
  } catch (e) {
    resultEl.textContent = 'Network error: ' + e.message;
    toast('Scan failed', 'error');
  }
}

async function loadHistory() {
  try {
    const r = await fetch('/api/keris/history');
    const data = await r.json();
    const scans = (data.scans || []).slice(0, 10);
    const el = document.getElementById('scan-history');
    if (scans.length === 0) {
      el.innerHTML = '<div style="color: var(--text-muted); font-size: 13px">No scan history yet.</div>';
      return;
    }
    el.innerHTML = scans.map(s => {
      const sev = (s.severity || 'info').toLowerCase();
      return '<div class="scan-history-item"><span class="severity-badge sev-' + sev + '">' + (s.severity || '?') + '</span> ' + s.target + ' <span style="color:var(--text-muted)">' + (s.start_time || '').slice(0, 10) + '</span></div>';
    }).join('');
  } catch (e) {}
}

loadHistory();
</script>
