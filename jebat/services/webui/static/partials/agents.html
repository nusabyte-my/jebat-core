<!-- Agents -->
<div>
  <h2 style="margin-bottom:var(--space-lg)">🤝 Agents</h2>
  <p class="text-muted mb-lg">Multi-agent orchestration — delegate tasks to specialized workers.</p>

  <div class="grid grid-3">
    <div class="card">
      <div class="card-header">
        <div class="card-title">Active Agents</div>
        <span class="badge badge-cyan">0</span>
      </div>
      <p class="text-sm text-muted">No agents currently running.</p>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">Completed Tasks</div>
        <span class="badge badge-green">0</span>
      </div>
      <p class="text-sm text-muted">No tasks completed yet.</p>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">Agent Config</div>
      </div>
      <div class="terminal" style="font-size:var(--font-size-xs)">
        <div><span class="prompt">$</span> jebat agents status</div>
        <div class="output">  Max concurrent: 3</div>
        <div class="output">  Max depth: 1</div>
        <div class="output">  Orchestrator: enabled</div>
      </div>
    </div>
  </div>
</div>
