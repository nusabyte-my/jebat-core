<!-- chat partial -->
<style>
  .chat-layout-fs { display: flex; flex-direction: column; height: calc(100vh - 94px); }
  .chat-messages-fs { flex: 1; overflow-y: auto; padding: var(--space-lg); display: flex; flex-direction: column; gap: var(--space-md); }
  .chat-input-fs { padding: var(--space-md) var(--space-lg); border-top: 1px solid var(--gray-light); background: var(--white); }
  .modes-row { display: flex; gap: var(--space-xs); margin-bottom: var(--space-sm); flex-wrap: wrap; align-items: center; }
  .mode-chip { padding: 4px 12px; border: 1px solid var(--gray-light); border-radius: var(--radius-pill); font-size: var(--size-small); cursor: pointer; background: var(--white); color: var(--stone); }
  .mode-chip:hover { border-color: var(--silver); }
  .mode-chip.selected { background: var(--near-black); color: var(--white); border-color: var(--near-black); }
  .chat-config-row { display: flex; gap: var(--space-sm); margin-bottom: var(--space-sm); flex-wrap: wrap; }
  .chat-config-row select { font-size: var(--size-small); padding: 4px 8px; border: 1px solid var(--gray-light); border-radius: 4px; background: var(--white); color: var(--stone); min-width: 130px; }
  .chat-config-row select:focus { outline: none; border-color: var(--near-black); }
  .chat-meta { font-size: var(--size-small); color: var(--gray-mid); margin-top: 4px; }
</style>

<div class="chat-layout-fs">
  <div class="chat-messages-fs" id="chat-log"></div>
  <div class="chat-input-fs">
    <div class="chat-config-row">
      <select id="chat-provider" title="LLM Provider"></select>
      <select id="chat-model" title="Model"></select>
      <select id="chat-preset" title="Chat Preset">
        <option value="default">Default</option>
      </select>
    </div>
    <div class="modes-row" id="mode-selector">
      <span class="mode-chip selected" data-mode="deliberate">Deliberate</span>
      <span class="mode-chip" data-mode="fast">Fast</span>
      <span class="mode-chip" data-mode="deep">Deep</span>
      <span class="mode-chip" data-mode="strategic">Strategic</span>
      <span class="mode-chip" data-mode="creative">Creative</span>
      <span class="mode-chip" data-mode="critical">Critical</span>
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" type="text" placeholder="Type a message…" autofocus />
      <button class="btn btn-black" id="chat-send">Send</button>
    </div>
  </div>
</div>

<script>
  const chatLog = document.getElementById('chat-log');
  const chatInput = document.getElementById('chat-input');
  const chatSend = document.getElementById('chat-send');
  let mode = 'deliberate';
  let activeProvider = null;
  let activeModel = null;
  let activePreset = 'default';

  // ── Load provider/model config from runtime ──
  async function loadChatConfig() {
    try {
      const rt = await API.runtime();
      const provider = rt.provider;
      const providers = rt.providers;
      const catalog = providers.catalog || {};

      // Populate provider dropdown
      const provSel = document.getElementById('chat-provider');
      provSel.innerHTML = '';
      const available = providers.available || [];
      available.forEach(p => {
        const label = p.label || p.provider;
        provSel.innerHTML += `<option value="${p.provider}" ${p.provider === provider.effective ? 'selected' : ''}>${label}${p.configured ? ' ✓' : ''}</option>`;
      });
      activeProvider = provider.effective;

      // Populate model dropdown for current provider
      updateModelDropdown(catalog, provider.effective, provider.model);

      // Populate presets
      const presets = provider.presets || [];
      const presetSel = document.getElementById('chat-preset');
      presetSel.innerHTML = '';
      presets.forEach(p => {
        const val = typeof p === 'string' ? p : (p.id || p.label);
        const label = typeof p === 'string' ? p : (p.label || p.id);
        presetSel.innerHTML += `<option value="${val}" ${val === (provider.default_preset || 'default') ? 'selected' : ''}>${label}</option>`;
      });
      activePreset = provider.default_preset || 'default';

      provSel.addEventListener('change', () => {
        activeProvider = provSel.value;
        updateModelDropdown(catalog, activeProvider, null);
      });
      document.getElementById('chat-model').addEventListener('change', e => { activeModel = e.target.value; });
      document.getElementById('chat-preset').addEventListener('change', e => { activePreset = e.target.value; });
    } catch (_) {
      console.warn('Could not load chat config');
    }
  }

  function updateModelDropdown(catalog, provider, currentModel) {
    const entry = catalog[provider];
    const models = entry ? (entry.models || []) : [];
    const supportsCustom = entry ? entry.supports_custom : false;
    const sel = document.getElementById('chat-model');
    sel.innerHTML = '';
    models.forEach(m => {
      sel.innerHTML += `<option value="${m}" ${m === currentModel ? 'selected' : ''}>${m}</option>`;
    });
    if (supportsCustom) {
      sel.innerHTML += `<option value="__custom__">Custom…</option>`;
      sel.addEventListener('change', () => {
        if (sel.value === '__custom__') {
          const custom = prompt('Enter model name:');
          if (custom && custom !== '__custom__') {
            sel.innerHTML += `<option value="${custom}" selected>${custom}</option>`;
            activeModel = custom;
          } else {
            sel.value = models[0] || '';
          }
        }
      }, {once: true});
    }
    activeModel = currentModel || (models[0] || '');
  }

  // Mode selector
  document.getElementById('mode-selector').addEventListener('click', e => {
    const chip = e.target.closest('.mode-chip');
    if (!chip) return;
    mode = chip.dataset.mode;
    document.querySelectorAll('.mode-chip').forEach(c => c.classList.remove('selected'));
    chip.classList.add('selected');
  });

  function addBubble(role, text, meta) {
    const cls = role === 'user' ? 'user' : '';
    const av = role === 'user' ? 'U' : 'J';
    const metaHtml = meta ? `<div class="chat-meta">${meta}</div>` : '';
    chatLog.innerHTML += `<div class="chat-entry ${cls}">
      <div class="chat-avatar">${av}</div>
      <div class="chat-bubble ${cls}">${escapeHtml(text)}${metaHtml}</div>
    </div>`;
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML.replace(/\n/g, '<br>');
  }

  async function sendMessage() {
    const text = chatInput.value.trim();
    if (!text) return;
    chatInput.value = '';
    chatInput.disabled = true;
    chatSend.disabled = true;

    addBubble('user', text);
    addBubble('agent', '<span class="pulse">Thinking…</span>', '');

    try {
      const res = await API.post('/chat', {
        user_id: 'webui',
        message: text,
        thinking_mode: mode,
        preset: activePreset
      });

      // Remove loading bubble
      const bubbles = chatLog.querySelectorAll('.chat-entry');
      if (bubbles.length > 0) bubbles[bubbles.length - 1].remove();

      const response = res.response || '(no response)';
      const metaParts = [];
      if (res.provider) metaParts.push(res.provider);
      if (res.model) metaParts.push(res.model);
      if (res.thinking_mode) metaParts.push(res.thinking_mode);
      addBubble('agent', response, metaParts.join(' · '));
    } catch (e) {
      const bubbles = chatLog.querySelectorAll('.chat-entry');
      if (bubbles.length > 0) bubbles[bubbles.length - 1].remove();
      addBubble('agent', `Error: ${e.message}`, '');
    }

    chatInput.disabled = false;
    chatSend.disabled = false;
    chatInput.focus();
  }

  chatSend.addEventListener('click', sendMessage);
  chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  loadChatConfig();
</script>
