<!-- Chat — Universal Chat Interface -->
<style>
  .chat-layout-fs { display: flex; height: calc(100vh - var(--topbar-height) - var(--space-lg) * 2); }
  .chat-sidebar { width: 230px; flex: 0 0 230px; padding: var(--space-md); border-right: 1px solid var(--border); background: var(--bg-surface); overflow-y: auto; }
  .chat-main { min-width: 0; flex: 1; display: flex; flex-direction: column; }
  .conversation-list { display: flex; flex-direction: column; gap: 4px; margin-top: var(--space-md); }
  .conversation-item { appearance: none; width: 100%; border: 1px solid transparent; border-radius: var(--radius-sm); padding: 8px; text-align: left; background: transparent; color: var(--text-secondary); cursor: pointer; }
  .conversation-item:hover, .conversation-item.active { background: var(--bg-card); border-color: var(--border); color: var(--text-primary); }
  .conversation-item span { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .conversation-item small { color: var(--text-muted); font-size: var(--font-size-xs); }
  .chat-messages-fs { flex: 1; overflow-y: auto; padding: var(--space-lg); display: flex; flex-direction: column; gap: var(--space-md); }
  .chat-input-fs { padding: var(--space-md) var(--space-lg); border-top: 1px solid var(--border); background: var(--bg-surface); }
  .chat-config-row { display: flex; gap: var(--space-sm); margin-bottom: var(--space-sm); flex-wrap: wrap; }
  .chat-config-row select { font-size: var(--font-size-sm); padding: 4px 8px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-card); color: var(--text-secondary); min-width: 130px; }
  .chat-config-row select:focus { outline: none; border-color: var(--cyan); }
  .modes-row { display: flex; gap: var(--space-xs); margin-bottom: var(--space-sm); flex-wrap: wrap; }
  .mode-chip { padding: 4px 12px; border: 1px solid var(--border); border-radius: var(--radius-pill); font-size: var(--font-size-xs); cursor: pointer; background: var(--bg-card); color: var(--text-muted); transition: all var(--transition-fast); }
  .mode-chip:hover { border-color: var(--cyan-dim); color: var(--text-primary); }
  .mode-chip.selected { background: var(--cyan); color: var(--bg-ink); border-color: var(--cyan); font-weight: 600; }
  .chat-msg { max-width: 80%; padding: var(--space-md); border-radius: var(--radius-lg); font-size: var(--font-size-base); line-height: 1.6; }
  .chat-msg.user { align-self: flex-end; background: var(--cyan); color: var(--bg-ink); border-bottom-right-radius: var(--radius-sm); }
  .chat-msg.assistant { align-self: flex-start; background: var(--bg-card); border: 1px solid var(--border); border-bottom-left-radius: var(--radius-sm); color: var(--text-primary); }
  .chat-msg.system { align-self: center; background: var(--bg-elevated); color: var(--text-muted); font-size: var(--font-size-sm); border: 1px solid var(--border); }
  @media (max-width: 720px) { .chat-sidebar { display: none; } }
</style>

<div class="chat-layout-fs">
  <aside class="chat-sidebar">
    <button class="btn btn-primary" id="new-conversation" style="width:100%">New chat</button>
    <div class="conversation-list" id="conversation-list"></div>
  </aside>
  <div class="chat-main">
    <div class="chat-messages-fs" id="chat-log"></div>
    <div class="chat-input-fs">
    <div class="chat-config-row">
      <select id="chat-provider" title="LLM Provider"></select>
      <select id="chat-model" title="Model"></select>
      <select id="chat-agent" title="Agent profile"><option value="">General assistant</option></select>
      <select id="chat-preset" title="Chat Preset">
        <option value="default">Default</option>
      </select>
    </div>
    <div class="modes-row" id="mode-selector">
      <span class="mode-chip selected" data-mode="deliberate">Deliberate</span>
      <span class="mode-chip" data-mode="fast">Fast</span>
      <span class="mode-chip" data-mode="deep">Deep</span>
      <span class="mode-chip" data-mode="strategic">Strategic</span>
      <span class="mode-chip" data-mode="creative">Creative</span>
      <span class="mode-chip" data-mode="critical">Critical</span>
    </div>
    <div class="chat-input-row" style="display:flex;gap:var(--space-sm)">
       <textarea class="input" id="chat-input" rows="1" placeholder="Message JEBAT..." autofocus style="flex:1;min-height:42px;max-height:160px;resize:vertical"></textarea>
      <button class="btn btn-primary" id="chat-send">Send</button>
    </div>
    </div>
  </div>
</div>

<script>
  const chatLog = document.getElementById('chat-log');
  const chatInput = document.getElementById('chat-input');
  const chatSend = document.getElementById('chat-send');
  let mode = 'deliberate';
  let activeProvider = null;
  let activeModel = null;
  let activePreset = 'default';
  let activeConversationId = null;
  let activeAgentProfileId = null;
  const userId = 'webui';

  function addChatMsg(text, role) {
    const div = document.createElement('div');
    div.className = `chat-msg ${role}`;
    div.textContent = text;
    chatLog.appendChild(div);
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  function resetChatLog(messages = []) {
    chatLog.replaceChildren();
    messages.forEach(message => addChatMsg(message.content, message.role));
  }

  async function loadConversations() {
    const data = await API.get(`/conversations?user_id=${encodeURIComponent(userId)}`);
    const list = document.getElementById('conversation-list');
    list.replaceChildren();
    data.conversations.forEach(conversation => {
      const button = document.createElement('button');
      button.className = `conversation-item${conversation.id === activeConversationId ? ' active' : ''}`;
      const title = document.createElement('span');
      title.textContent = conversation.title;
      const count = document.createElement('small');
      count.textContent = `${conversation.message_count} messages`;
      button.append(title, count);
      button.addEventListener('click', () => openConversation(conversation.id));
      list.appendChild(button);
    });
  }

  async function openConversation(conversationId) {
    const conversation = await API.get(`/conversations/${conversationId}?user_id=${encodeURIComponent(userId)}`);
    activeConversationId = conversation.id;
    resetChatLog(conversation.messages);
    await loadConversations();
  }

  async function newConversation() {
    const conversation = await API.post('/conversations', { user_id: userId });
    activeConversationId = conversation.id;
    resetChatLog();
    await loadConversations();
    chatInput.focus();
  }

  async function sendChat() {
    const text = chatInput.value.trim();
    if (!text) return;
    chatInput.value = '';
    addChatMsg(text, 'user');

    chatSend.disabled = true;
    try {
      const data = await API.chat({
        user_id: userId,
        message: text,
        thinking_mode: mode,
        preset: activePreset,
        conversation_id: activeConversationId,
        agent_profile_id: activeAgentProfileId,
      });
      activeConversationId = data.conversation_id || activeConversationId;
      addChatMsg(data.response || data.error || 'No response', 'assistant');
      await loadConversations();
    } catch (e) {
      addChatMsg('Connection error — is the JEBAT API running?', 'system');
    } finally {
      chatSend.disabled = false;
      chatInput.focus();
    }
  }

  chatSend.addEventListener('click', sendChat);
  chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  });
  document.getElementById('new-conversation').addEventListener('click', newConversation);

  // Mode selector
  document.querySelectorAll('.mode-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.mode-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      mode = chip.dataset.mode;
    });
  });

  // Load config
  (async () => {
    try {
      await loadConversations();
      if (typeof API !== 'undefined') {
        const rt = await API.runtime();
        const catalog = rt.providers?.catalog || {};
        const provSel = document.getElementById('chat-provider');
        const modelSel = document.getElementById('chat-model');
        const agentSel = document.getElementById('chat-agent');
        const presetSel = document.getElementById('chat-preset');
        const configured = new Set((rt.providers?.available || [])
          .filter(item => item.configured)
          .map(item => item.provider));

        for (const [name, info] of Object.entries(catalog)) {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = info.label || name;
          opt.disabled = configured.size > 0 && !configured.has(name);
          if (name === rt.provider?.effective) opt.selected = true;
          provSel.appendChild(opt);
        }

        const setModels = provider => {
          const models = catalog[provider]?.models || [];
          modelSel.replaceChildren();
          for (const model of models) {
            const opt = document.createElement('option');
            opt.value = model;
            opt.textContent = model;
            if (model === activeModel) opt.selected = true;
            modelSel.appendChild(opt);
          }
          activeModel = modelSel.value || null;
        };

        activeProvider = rt.provider?.effective || provSel.value;
        activeModel = rt.provider?.model || null;
        provSel.value = activeProvider;
        setModels(activeProvider);

        for (const preset of rt.provider?.presets || []) {
          const name = typeof preset === 'string' ? preset : preset.name;
          if (!name) continue;
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          if (name === rt.provider?.default_preset) opt.selected = true;
          presetSel.appendChild(opt);
        }
        activePreset = presetSel.value;

        const profiles = await API.get(`/agents/profiles?user_id=${encodeURIComponent(userId)}`);
        profiles.profiles.forEach(profile => {
          const opt = document.createElement('option');
          opt.value = profile.id;
          opt.textContent = profile.name;
          agentSel.appendChild(opt);
        });
        agentSel.addEventListener('change', () => { activeAgentProfileId = agentSel.value || null; });

        provSel.addEventListener('change', async () => {
          activeProvider = provSel.value;
          activeModel = null;
          setModels(activeProvider);
          await API.setRuntime({ provider: activeProvider, model: activeModel });
        });
        modelSel.addEventListener('change', async () => {
          activeModel = modelSel.value || null;
          await API.setRuntime({ provider: activeProvider, model: activeModel });
        });
        presetSel.addEventListener('change', () => { activePreset = presetSel.value; });
      }
    } catch {}
  })();
</script>
