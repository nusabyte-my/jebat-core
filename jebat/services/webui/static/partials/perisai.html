<!-- Perisai — Nexus Multi-Channel Dashboard -->
<style>
  .nexus-layout { display: flex; flex-direction: column; gap: var(--space-lg); }
  .nexus-channels { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--space-md); }
  .nexus-channel {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: var(--space-lg); transition: all var(--transition-base);
  }
  .nexus-channel:hover { border-color: var(--border-hover); }
  .nexus-channel-header { display: flex; align-items: center; gap: var(--space-sm); margin-bottom: var(--space-md); }
  .nexus-channel-icon { font-size: 24px; }
  .nexus-channel-name { font-weight: 600; color: var(--text-bright); }
  .nexus-channel-platform { font-size: var(--font-size-xs); color: var(--text-muted); font-family: var(--font-mono); }
  .nexus-channel-status { margin-left: auto; }
  .nexus-channel-actions { display: flex; gap: var(--space-sm); margin-top: var(--space-md); }
  .nexus-platform-icon { font-size: 32px; }
  .nexus-send-area { display: flex; gap: var(--space-sm); }
  .nexus-send-area .input { flex: 1; }
</style>

<div class="nexus-layout">
  <div class="flex items-center justify-between">
    <div>
      <h2 style="margin:0">🌐 Perisai — Nexus</h2>
      <p style="margin:0;font-size:var(--font-size-sm)">Multi-Channel Bot Orchestrator</p>
    </div>
    <div class="flex gap-sm">
      <button class="btn btn-sm" id="nexus-health">🏥 Health</button>
      <button class="btn btn-primary btn-sm" id="nexus-add-btn">+ Add Channel</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="grid grid-4">
    <div class="stat-card cyan">
      <div class="stat-label">Total Channels</div>
      <div class="stat-value" id="nexus-total">0</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Active</div>
      <div class="stat-value" id="nexus-active">0</div>
    </div>
    <div class="stat-card purple">
      <div class="stat-label">Platforms</div>
      <div class="stat-value" id="nexus-platforms">0</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-label">Messages</div>
      <div class="stat-value" id="nexus-messages">0</div>
    </div>
  </div>

  <!-- Channels -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">Connected Channels</div>
    </div>
    <div class="nexus-channels" id="nexus-channels">
      <div class="empty-state" style="padding:32px;grid-column:1/-1">
        <div class="empty-state-icon">📡</div>
        <div class="empty-state-title">No channels configured</div>
        <div class="empty-state-desc">Add a messaging platform to get started.</div>
      </div>
    </div>
  </div>

  <!-- Broadcast -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">📢 Broadcast</div>
    </div>
    <div class="nexus-send-area">
      <input class="input" id="nexus-broadcast-input" placeholder="Message to broadcast to all channels..." />
      <button class="btn btn-primary" id="nexus-broadcast-btn">Send to All</button>
    </div>
  </div>

  <!-- Health Modal -->
  <div class="card" id="nexus-health-card" style="display:none">
    <div class="card-header">
      <div class="card-title">🏥 Channel Health</div>
      <button class="btn btn-sm" onclick="document.getElementById('nexus-health-card').style.display='none'">✕</button>
    </div>
    <div id="nexus-health-results"></div>
  </div>
</div>

<script>
  const PLATFORM_ICONS = {
    telegram: '📱', discord: '🎮', slack: '💼',
    signal: '🔒', matrix: '🔗', whatsapp: '📞', webhook: '🌐'
  };

  document.getElementById('nexus-add-btn').addEventListener('click', () => {
    const platform = prompt('Platform (telegram/discord/slack/signal/matrix/whatsapp):');
    if (!platform) return;
    const channelId = prompt('Channel ID:');
    if (!channelId) return;
    const token = prompt('Bot token or webhook URL (optional):');

    fetch('/api/nexus/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ platform, channel_id: channelId, token: token || '' }),
    }).then(() => location.reload());
  });

  document.getElementById('nexus-health').addEventListener('click', async () => {
    const card = document.getElementById('nexus-health-card');
    const results = document.getElementById('nexus-health-results');
    card.style.display = '';
    results.innerHTML = '<div class="spinner"></div>';
    try {
      const res = await fetch('/api/nexus/health');
      const data = await res.json();
      results.innerHTML = Object.entries(data).map(([ch, info]) => `
        <div class="flex items-center gap-sm" style="padding:8px 0;border-bottom:1px solid var(--border)">
          <span class="status-dot ${info.healthy ? 'online' : 'error'}"></span>
          <span style="font-family:var(--font-mono);font-size:var(--font-size-sm)">${info.platform}</span>
          <span style="color:var(--text-secondary);font-size:var(--font-size-sm)">${ch}</span>
          <span class="badge ${info.healthy ? 'badge-green' : 'badge-red'}" style="margin-left:auto">${info.healthy ? 'OK' : 'FAIL'}</span>
        </div>
      `).join('');
    } catch { results.innerHTML = '<div class="text-red text-sm">Failed to check health</div>'; }
  });
</script>
