<!-- Perisai — Nexus Multi-Channel -->
<style>
  .channel-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .channel-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
  .channel-card h3 { font-size: 14px; margin-bottom: 8px; color: var(--text-bright); }
  .channel-status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .ch-active { background: #22c55e; }
  .ch-inactive { background: var(--text-muted); }
  .send-form { display: flex; gap: 8px; margin-bottom: 16px; }
  .send-form input { flex: 1; }
</style>

<div class="page-header">
  <div>
    <h1 class="page-title">📡 Perisai — Nexus</h1>
    <p class="page-desc">Multi-channel bot orchestrator</p>
  </div>
</div>

<!-- Send Message -->
<div class="send-form">
  <select id="nexus-channel" class="input" style="flex:0 0 200px">
    <option value="">Select channel...</option>
  </select>
  <input type="text" id="nexus-message" placeholder="Message content..." class="input" />
  <button class="btn btn-primary" onclick="sendMessage()">📤 Send</button>
  <button class="btn" onclick="broadcastMessage()">📡 Broadcast</button>
</div>

<!-- Channels -->
<div class="section-title" style="margin-bottom:12px">Channels</div>
<div class="channel-grid" id="channel-grid">
  <div style="color: var(--text-muted); font-size: 13px">Loading channels...</div>
</div>

<!-- Stats -->
<div class="card" style="margin-top:16px">
  <div class="section-title" style="margin-bottom:8px">Nexus Stats</div>
  <div id="nexus-stats" style="font-size: 13px; color: var(--text-muted)">Loading...</div>
</div>

<script>
async function loadChannels() {
  try {
    const r = await fetch('/api/nexus/channels');
    const data = await r.json();
    const channels = data.channels || [];
    const grid = document.getElementById('channel-grid');
    const select = document.getElementById('nexus-channel');

    // Update select
    select.innerHTML = '<option value="">Select channel...</option>' +
      channels.map(c => '<option value="' + c.channel_id + '">[' + c.platform + '] ' + c.channel_id + '</option>').join('');

    if (channels.length === 0) {
      grid.innerHTML = '<div style="color: var(--text-muted); font-size: 13px">No channels configured. Use: <code>jebat nexus add &lt;platform&gt; &lt;channel_id&gt;</code></div>';
      return;
    }

    grid.innerHTML = channels.map(c => {
      const active = c.enabled && c.has_token;
      return '<div class="channel-card"><h3><span class="channel-status ' + (active ? 'ch-active' : 'ch-inactive') + '"></span>' + c.platform + '</h3><div style="font-size:12px;color:var(--text-muted)">' + c.channel_id + '</div><div style="font-size:12px;margin-top:4px">' + (active ? '✅ Connected' : '⚠️ No token') + '</div></div>';
    }).join('');

    logActivity('NEXUS', 'Channels loaded: ' + channels.length);
  } catch (e) {
    console.error('Failed to load channels:', e);
  }
}

async function loadStats() {
  try {
    const r = await fetch('/api/nexus/stats');
    const s = await r.json();
    if (s.error) return;
    document.getElementById('nexus-stats').innerHTML = [
      'Channels: ' + (s.active_channels || 0) + '/' + (s.total_channels || 0) + ' active',
      'Messages: ' + (s.total_messages || 0),
      s.platforms ? 'Platforms: ' + Object.entries(s.platforms).map(([k,v]) => k + '(' + v + ')').join(', ') : '',
    ].filter(Boolean).map(i => '<div style="margin-bottom:4px">• ' + i + '</div>').join('');
  } catch (e) {}
}

async function sendMessage() {
  const channel = document.getElementById('nexus-channel').value;
  const content = document.getElementById('nexus-message').value.trim();
  if (!channel || !content) { toast('Select a channel and enter a message', 'error'); return; }

  try {
    const r = await fetch('/api/nexus/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({channel_id: channel, content})
    });
    const data = await r.json();
    if (data.ok) {
      toast('Message sent to ' + channel, 'success');
      logActivity('NEXUS', 'Message sent: ' + channel);
      document.getElementById('nexus-message').value = '';
    } else {
      toast('Failed: ' + (data.error || 'Unknown error'), 'error');
    }
  } catch (e) {
    toast('Network error', 'error');
  }
}

async function broadcastMessage() {
  const content = document.getElementById('nexus-message').value.trim();
  if (!content) { toast('Enter a message', 'error'); return; }
  if (!await confirm('Broadcast', 'Send this message to ALL channels?')) return;

  try {
    const r = await fetch('/api/nexus/broadcast', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({content})
    });
    const data = await r.json();
    const results = data.results || {};
    const ok = Object.values(results).filter(r => r.ok).length;
    toast('Broadcast: ' + ok + '/' + Object.keys(results).length + ' succeeded', ok > 0 ? 'success' : 'error');
    logActivity('NEXUS', 'Broadcast: ' + ok + '/' + Object.keys(results).length);
    document.getElementById('nexus-message').value = '';
  } catch (e) {
    toast('Network error', 'error');
  }
}

loadChannels();
loadStats();
</script>
