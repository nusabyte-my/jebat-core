<!-- workstation partial -->
<div class="container section-sm">
  <h2>Workstations</h2>
  <p class="small muted" style="margin-bottom: var(--space-lg);">Connected compute nodes in the JEBAT mesh. Your local machine + any VPS instances.</p>
</div>

<div class="container" style="margin-bottom: var(--space-lg);">
  <div class="card">
    <div class="card-header"><div class="card-title">Add a Workstation</div></div>
    <div class="card-body">
      <div class="form-row" style="margin-bottom: var(--space-md);">
        <div class="form-group">
          <label class="form-label">Name (unique ID)</label>
          <input class="input" id="station-name" placeholder="nusabytePro" />
        </div>
        <div class="form-group">
          <label class="form-label">Deploy Path</label>
          <input class="input" id="station-path" placeholder="/opt/jebat" />
        </div>
      </div>
      <div class="form-row" style="margin-bottom: var(--space-md);">
        <div class="form-group">
          <label class="form-label">SSH Host</label>
          <input class="input" id="station-host" placeholder="72.62.255.206" />
        </div>
        <div class="form-group">
          <label class="form-label">SSH User</label>
          <input class="input" id="station-user" placeholder="root" value="root" />
        </div>
      </div>
      <div class="form-row" style="margin-bottom: var(--space-md);">
        <div class="form-group">
          <label class="form-label">Notes (optional)</label>
          <input class="input" id="station-notes" placeholder="KL VPS, 8vCPU/32GB" />
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-black" id="station-connect">Save &amp; Connect</button>
      </div>
      <span class="small muted" style="margin-left: var(--space-md);" id="station-status"></span>
    </div>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="card-header"><div class="card-title">Connected Nodes</div></div>
    <div class="card-body" id="station-list">Loading…</div>
  </div>
</div>

<script>
  async function loadStations() {
    try {
      const data = await API.get('/workstations/connect');
      const stations = data.connections || data.workstations || {};
      const names = Object.keys(stations);
      const list = document.getElementById('station-list');

      if (names.length === 0) {
        list.innerHTML = '<div class="empty"><h3>No workstations connected</h3><p>Add a VPS or remote node above.</p></div>';
        return;
      }

      list.innerHTML = '<div class="stack-sm">' + names.map(name => {
        const s = stations[name];
        const host = s.ssh_host || s.host || '';
        const status = s.connected ? 'connected' : 'disconnected';
        return `<div class="mini-card">
          <strong>${name}</strong>
          <span>${host} · ${status}</span>
          <button class="btn btn-outline btn-sm" data-station="${name}">Check</button>
        </div>`;
      }).join('') + '</div>';

      list.querySelectorAll('[data-station]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const statusEl = document.getElementById('station-status');
          statusEl.textContent = `Checking ${btn.dataset.station}…`;
          try {
            await API.post('/workstations/check', { workstation: btn.dataset.station });
            statusEl.textContent = `${btn.dataset.station}: OK.`;
          } catch (e) {
            statusEl.textContent = `${btn.dataset.station}: ${e.message}`;
          }
          setTimeout(() => statusEl.textContent = '', 5000);
        });
      });
    } catch (_) {
      document.getElementById('station-list').innerHTML = '<div class="empty"><p>Workstation service not available.</p></div>';
    }
  }

  document.getElementById('station-connect').addEventListener('click', async () => {
    const name = document.getElementById('station-name').value;
    const host = document.getElementById('station-host').value;
    const user = document.getElementById('station-user').value;
    const path = document.getElementById('station-path').value;
    const notes = document.getElementById('station-notes').value;
    const statusEl = document.getElementById('station-status');

    if (!name || !host) { statusEl.textContent = 'Name and SSH host are required.'; return; }

    try {
      await API.post('/workstations/connect', {
        workstation: name,
        ssh_host: host,
        ssh_user: user || 'root',
        path: path || '/opt/jebat',
        notes: notes || ''
      });
      statusEl.textContent = 'Saved.';
      loadStations();
      setTimeout(() => statusEl.textContent = '', 3000);
    } catch (e) {
      statusEl.textContent = 'Error: ' + e.message;
    }
  });

  loadStations();
</script>
