<!-- Sahabat — Companion Chat -->
<style>
  .sahabat-layout { display: flex; flex-direction: column; height: calc(100vh - var(--topbar-height) - var(--space-lg) * 2); }
  .sahabat-header { display: flex; align-items: center; gap: var(--space-md); padding: var(--space-md); border-bottom: 1px solid var(--border); }
  .sahabat-header-icon { font-size: 32px; }
  .sahabat-header-info h3 { margin: 0; font-size: var(--font-size-lg); }
  .sahabat-header-info p { margin: 0; font-size: var(--font-size-sm); color: var(--text-muted); }
  .sahabat-tabs { display: flex; gap: 2px; padding: 0 var(--space-md); border-bottom: 1px solid var(--border); }
  .sahabat-tab { padding: var(--space-sm) var(--space-md); font-size: var(--font-size-sm); color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all var(--transition-fast); }
  .sahabat-tab:hover { color: var(--text-primary); }
  .sahabat-tab.active { color: var(--green); border-bottom-color: var(--green); }
  .sahabat-messages { flex: 1; overflow-y: auto; padding: var(--space-lg); display: flex; flex-direction: column; gap: var(--space-md); }
  .sahabat-msg { max-width: 75%; padding: var(--space-md); border-radius: var(--radius-lg); font-size: var(--font-size-base); line-height: 1.6; }
  .sahabat-msg.user { align-self: flex-end; background: var(--green); color: var(--bg-ink); border-bottom-right-radius: var(--radius-sm); }
  .sahabat-msg.assistant { align-self: flex-start; background: var(--bg-card); border: 1px solid var(--border); border-bottom-left-radius: var(--radius-sm); }
  .sahabat-msg .msg-meta { font-size: var(--font-size-xs); color: var(--text-muted); margin-top: var(--space-xs); }
  .sahabat-input { padding: var(--space-md); border-top: 1px solid var(--border); background: var(--bg-surface); }
  .sahabat-input-row { display: flex; gap: var(--space-sm); }
  .sahabat-input-row .input { flex: 1; }
  .sahabat-welcome { text-align: center; padding: var(--space-3xl, 80px) var(--space-lg); }
  .sahabat-welcome-icon { font-size: 64px; margin-bottom: var(--space-md); }
  .sahabat-welcome h2 { color: var(--text-bright); margin-bottom: var(--space-sm); }
  .sahabat-welcome p { color: var(--text-muted); max-width: 500px; margin: 0 auto; }
  .sahabat-quick-actions { display: flex; gap: var(--space-sm); justify-content: center; margin-top: var(--space-lg); flex-wrap: wrap; }
  .sahabat-quick-btn { padding: var(--space-sm) var(--space-md); background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-pill); color: var(--text-secondary); cursor: pointer; font-size: var(--font-size-sm); transition: all var(--transition-fast); }
  .sahabat-quick-btn:hover { border-color: var(--green); color: var(--green); }
</style>

<div class="sahabat-layout">
  <div class="sahabat-header">
    <div class="sahabat-header-icon">🤖</div>
    <div class="sahabat-header-info">
      <h3>Sahabat</h3>
      <p>Conversational AI for daily ops — briefings, tasks, meetings</p>
    </div>
    <span class="badge badge-green" style="margin-left:auto">v1.0</span>
  </div>
  <div class="sahabat-tabs">
    <div class="sahabat-tab active" data-tab="chat">💬 Chat</div>
    <div class="sahabat-tab" data-tab="briefing">📋 Briefing</div>
    <div class="sahabat-tab" data-tab="tasks">✅ Tasks</div>
    <div class="sahabat-tab" data-tab="meeting">📝 Meeting</div>
  </div>
  <div class="sahabat-messages" id="sahabat-messages">
    <div class="sahabat-welcome">
      <div class="sahabat-welcome-icon">🤖</div>
      <h2>Hey, I'm Sahabat</h2>
      <p>Your AI companion for daily operations. Ask me anything — from daily briefings to meeting summaries to task management.</p>
      <div class="sahabat-quick-actions">
        <button class="sahabat-quick-btn" onclick="sendQuick('Give me my daily briefing')">📋 Daily Briefing</button>
        <button class="sahabat-quick-btn" onclick="sendQuick('Show my pending tasks')">✅ Pending Tasks</button>
        <button class="sahabat-quick-btn" onclick="sendQuick('Help me plan my day')">🗓️ Plan My Day</button>
        <button class="sahabat-quick-btn" onclick="sendQuick('What have you been up to?')">💬 Catch Up</button>
      </div>
    </div>
  </div>
  <div class="sahabat-input">
    <div class="sahabat-input-row">
      <input class="input" id="sahabat-input" type="text" placeholder="Talk to Sahabat..." autofocus />
      <button class="btn btn-primary" id="sahabat-send">Send</button>
    </div>
  </div>
</div>

<script>
  const messages = document.getElementById('sahabat-messages');
  const input = document.getElementById('sahabat-input');
  const sendBtn = document.getElementById('sahabat-send');

  function addMessage(text, role) {
    // Remove welcome if present
    const welcome = messages.querySelector('.sahabat-welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `sahabat-msg ${role}`;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function sendQuick(text) {
    input.value = text;
    sendMessage();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addMessage(text, 'user');

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: 'webui', message: text, preset: 'default' }),
      });
      const data = await res.json();
      addMessage(data.reply || data.error || 'No response', 'assistant');
    } catch (e) {
      addMessage('Connection error — is the JEBAT API running?', 'assistant');
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  // Tab switching
  document.querySelectorAll('.sahabat-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.sahabat-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
    });
  });
</script>
