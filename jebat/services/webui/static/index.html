<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JEBAT</title>
  <link rel="stylesheet" href="/webui/static/css/brutalist.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Navigation -->
  <nav class="nav">
    <a class="nav-brand" href="#home" data-page="home">
      <div class="nav-brand-icon">J</div>
      JEBAT
    </a>
    <div class="nav-links" id="nav-links">
      <a class="nav-link" data-page="dashboard" href="#dashboard">Dashboard</a>
      <a class="nav-link" data-page="chat" href="#chat">Chat</a>
      <a class="nav-link" data-page="control" href="#control">Control</a>
      <a class="nav-link" data-page="skills" href="#skills">Skills</a>
      <a class="nav-link" data-page="agents" href="#agents">Agents</a>
      <a class="nav-link" data-page="channels" href="#channels">Channels</a>
      <a class="nav-link" data-page="station" href="#station">Station</a>
      <a class="nav-link" data-page="learning" href="#learning">Learning</a>
      <a class="nav-link" data-page="setup" href="#setup">Setup</a>
    </div>
  </nav>

  <!-- Status strip -->
  <div id="status-strip" class="status-strip"></div>

  <!-- Page content -->
  <main id="app-shell"></main>

  <script src="/webui/static/js/api.js"></script>
  <script>
    // ── Shell router ──
    const partialCache = {};

    async function loadPartial(name) {
      const res = await fetch(`/webui/partials/${name}?r=${Math.random()}`);
      if (!res.ok) return;
      partialCache[name] = await res.text();
    }

    function removeScripts(container) {
      container.querySelectorAll('script').forEach(s => s.remove());
    }

    function runScripts(container) {
      container.querySelectorAll('script:not([src])').forEach(old => {
        const s = document.createElement('script');
        s.textContent = old.textContent;
        old.replaceWith(s);
      });
    }

    async function navigate(name) {
      const main = document.getElementById('app-shell');
      if (!main) return;

      // Active nav link
      document.querySelectorAll('.nav-link').forEach(lnk => {
        lnk.classList.toggle('active', lnk.dataset.page === name);
      });

      // Show skeleton
      main.innerHTML = '<div class="section">Loading…</div>';

      // Load partial if not cached
      await loadPartial(name);
      const partial = partialCache[name];
      if (!partial) {
        main.innerHTML = '<div class="empty"><h3>Not found</h3><p>Page /' + name + ' is missing.</p></div>';
        return;
      }

      main.innerHTML = partial;
      runScripts(main);
      window.location.hash = name;
    }

    // Bind nav clicks
    document.addEventListener('click', e => {
      const link = e.target.closest('[data-page]');
      if (!link) return;
      e.preventDefault();
      navigate(link.dataset.page);
    });

    // Bind hash changes
    window.addEventListener('hashchange', () => {
      const name = (window.location.hash || '#home').replace('#', '');
      navigate(name);
    });

    // Init
    async function boot() {
      updateStatusStrip();
      const initial = (window.location.hash || '#home').replace('#', '');
      await navigate(initial);
    }

    boot();
  </script>
</body>
</html>
