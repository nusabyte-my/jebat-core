# JEBAT CI/CD Pipeline
# Full pipeline: tests → build → deploy → security → notify

name: JEBAT CI/CD

permissions:
  contents: read
  security-events: write

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Unit Tests (fast, no external deps) ─────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run unit tests
        run: python -m pytest -m "unit" -v --tb=short --strict-markers

  # ─── Integration Tests (mocked services) ─────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run integration tests
        run: python -m pytest -m "integration" -v --tb=short --strict-markers

  # ─── Full Suite with Coverage ────────────────────────────────────
  coverage:
    name: Full Suite + Coverage
    runs-on: ubuntu-latest
    needs: [unit, integration]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run full test suite with coverage
        run: |
          python -m pytest -v --tb=short --strict-markers \
            --cov=. --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ─── Lint & Syntax Check ────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax check test files
        run: python -m py_compile test_*.py

  # ─── Build Docker Image ─────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [unit, integration, coverage]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/jebat:latest
            ${{ secrets.DOCKER_USERNAME }}/jebat:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/jebat:buildcache
          cache-to: type=inline

  # ─── Deploy to Staging ──────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.jebat.online
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Pull latest image and restart via docker compose
          # ssh deploy@staging.jebat.online "cd /opt/jebat && docker compose pull && docker compose up -d"

  # ─── Deploy to Production ───────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://jebat.online
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # ssh deploy@72.62.254.65 "cd /opt/jebat && docker compose -f docker-compose.yml -f docker-compose.prod.yml pull && docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d"

  # ─── Security Scan ──────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # ─── Notify ──────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [unit, integration, coverage, lint, build, deploy-staging, deploy-production, security]
    if: always()
    steps:
      - name: Notify success/failure
        run: |
          if [ "${{ needs.unit.result }}" == "success" ] && \
             [ "${{ needs.integration.result }}" == "success" ] && \
             [ "${{ needs.coverage.result }}" == "success" ] && \
             [ "${{ needs.lint.result }}" == "success" ] && \
             [ "${{ needs.build.result }}" != "failure" ] && \
             [ "${{ needs.security.result }}" != "failure" ]; then
            echo "✅ CI/CD pipeline completed successfully"
          else
            echo "❌ CI/CD pipeline failed"
            echo "  unit:        ${{ needs.unit.result }}"
            echo "  integration: ${{ needs.integration.result }}"
            echo "  coverage:    ${{ needs.coverage.result }}"
            echo "  lint:        ${{ needs.lint.result }}"
            echo "  build:       ${{ needs.build.result }}"
            echo "  deploy-stg:  ${{ needs.deploy-staging.result }}"
            echo "  deploy-prod: ${{ needs.deploy-production.result }}"
            echo "  security:    ${{ needs.security.result }}"
            exit 1
          fi
