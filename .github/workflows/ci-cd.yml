# JEBAT CI/CD Pipeline
# Full pipeline: tests → build → deploy → security → notify

name: JEBAT CI/CD

permissions:
  contents: read
  security-events: write

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Unit Tests (fast, no external deps) ─────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run unit tests
        run: python -m pytest -m "unit" -v --tb=short --strict-markers

  # ─── Integration Tests (mocked services) ─────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run integration tests
        run: python -m pytest -m "integration" -v --tb=short --strict-markers

  # ─── Full Suite with Coverage ────────────────────────────────────
  coverage:
    name: Full Suite + Coverage
    runs-on: ubuntu-latest
    needs: [unit, integration]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run full test suite with coverage
        run: |
          python -m pytest -v --tb=short --strict-markers \
            --cov=. --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ─── Lint & Syntax Check ────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax check test files
        run: python -m py_compile test_*.py

  # ─── Build Docker Image ─────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [unit, integration, coverage]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/jebat:latest
            ${{ secrets.DOCKER_USERNAME }}/jebat:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/jebat:buildcache
          cache-to: type=inline

  # ─── Deploy to Staging (72.62.255.206) ──────────────────────────
  deploy-staging:
    name: Deploy to Staging (.206)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.jebat.online
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan 72.62.255.206 >> ~/.ssh/known_hosts

      - name: Pull latest code on staging VPS
        run: |
          echo "Deploying commit ${{ github.sha }} to staging (72.62.255.206)"
          ssh root@72.62.255.206 "cd /var/www/jebat-core && \
        run: |
          ssh root@72.62.255.206 "cd /var/www/jebat-core && \
            git fetch origin main && \
            git reset --hard origin/main && \
            echo '✅ Code updated on staging'"

      - name: Install dependencies on staging
        run: |
          ssh root@72.62.255.206 "cd /var/www/jebat-core && \
            if [ -f requirements.prod.txt ]; then pip install -r requirements.prod.txt --quiet; else pip install -r requirements.txt --quiet; fi && \
            echo '✅ Dependencies updated on staging'"

      - name: Restart PM2 processes on staging
        run: |
          ssh root@72.62.255.206 "cd /var/www/jebat-core && \
            pm2 restart jebat-api 2>/dev/null || \
            pm2 start \"python -m uvicorn main:app --host 0.0.0.0 --port 8080 --workers 2\" --name jebat-api && \
            pm2 save && \
            echo '✅ PM2 processes restarted on staging'"

      - name: Verify staging health
        run: |
          HEALTHY=false
          for i in 1 2 3 4 5; do
            if ssh root@72.62.255.206 "curl -sf http://localhost:8080/health"; then
              HEALTHY=true
              break
            fi
            echo "Attempt $i/5 failed, retrying in 5s..."
            sleep 5
          done
          if [ "$HEALTHY" != "true" ]; then
            echo '⚠️ Staging health check failed after 5 attempts'
            exit 1
          fi
          echo '✅ Staging health check passed'

  # ─── Deploy to Production (72.62.254.65) ────────────────────────
  deploy-production:
    name: Deploy to Production (.65)
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://jebat.online
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan 72.62.254.65 >> ~/.ssh/known_hosts

      - name: Pull latest code on production VPS
        run: |
          echo "Deploying commit ${{ github.sha }} to production (72.62.254.65)"
          ssh root@72.62.254.65 "cd /var/www/jebat-core && \
        run: |
          ssh root@72.62.254.65 "cd /var/www/jebat-core && \
            git fetch origin main && \
            git reset --hard origin/main && \
            echo '✅ Code updated on production'"

      - name: Install dependencies on production
        run: |
          ssh root@72.62.254.65 "cd /var/www/jebat-core && \
            if [ -f requirements.prod.txt ]; then pip install -r requirements.prod.txt --quiet; else pip install -r requirements.txt --quiet; fi && \
            echo '✅ Dependencies updated on production'"

      - name: Restart PM2 processes on production
        run: |
          ssh root@72.62.254.65 "cd /var/www/jebat-core && \
            pm2 restart jebat-api 2>/dev/null || \
            pm2 start \"python -m uvicorn main:app --host 0.0.0.0 --port 8080 --workers 4\" --name jebat-api && \
            pm2 save && \
            echo '✅ PM2 processes restarted on production'"

      - name: Verify production health
        run: |
          HEALTHY=false
          for i in 1 2 3 4 5; do
            if ssh root@72.62.254.65 "curl -sf http://localhost:8080/health"; then
              HEALTHY=true
              break
            fi
            echo "Attempt $i/5 failed, retrying in 5s..."
            sleep 5
          done
          if [ "$HEALTHY" != "true" ]; then
            echo '⚠️ Production health check failed after 5 attempts'
            exit 1
          fi
          echo '✅ Production health check passed'

  # ─── Security Scan ──────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # ─── Notify ──────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [unit, integration, coverage, lint, build, deploy-staging, deploy-production, security]
    if: always()
    steps:
      - name: Notify success/failure
        run: |
          if [ "${{ needs.unit.result }}" == "success" ] && \
             [ "${{ needs.integration.result }}" == "success" ] && \
             [ "${{ needs.coverage.result }}" == "success" ] && \
             [ "${{ needs.lint.result }}" == "success" ] && \
             [ "${{ needs.build.result }}" != "failure" ] && \
             [ "${{ needs.security.result }}" != "failure" ]; then
            echo "✅ CI/CD pipeline completed successfully"
          else
            echo "❌ CI/CD pipeline failed"
            echo "  unit:        ${{ needs.unit.result }}"
            echo "  integration: ${{ needs.integration.result }}"
            echo "  coverage:    ${{ needs.coverage.result }}"
            echo "  lint:        ${{ needs.lint.result }}"
            echo "  build:       ${{ needs.build.result }}"
            echo "  deploy-stg:  ${{ needs.deploy-staging.result }}"
            echo "  deploy-prod: ${{ needs.deploy-production.result }}"
            echo "  security:    ${{ needs.security.result }}"
            exit 1
          fi
