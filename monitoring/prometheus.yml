# Prometheus Configuration for JEBAT Monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # JEBAT API metrics
  - job_name: 'jebat-api'
    static_configs:
      - targets: ['jebat-api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # JEBAT Ultra-Loop metrics
  - job_name: 'jebat-loop'
    static_configs:
      - targets: ['jebat-loop:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # PostgreSQL metrics
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  # Node exporter (system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']
